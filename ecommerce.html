<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>承閎電子商務 報價表單</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 750px;
    margin: 40px auto;
    padding: 0 16px;
    background:#f9f9fb;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
    display:block;
    margin-bottom:8px;
}

input[type="text"],
input[type="date"]{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

.sub-section{
    margin-left:20px;
    margin-top:10px;
}

.btn{
    background:#673ab7;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}
</style>
</head>
<body>

<h2>承閎電子商務 — 產品報價申請</h2>

<form id="quotationForm">

<!-- 基本資料 -->
<div class="card">
    <h3>基本資料</h3>
    <label>公司名稱及聯絡人 *</label>
    <input type="text" required>

    <label>回覆電話號碼 / 電子郵件 *</label>
    <input type="text" required>
</div>

<!-- 產品類型 -->
<div class="card">
    <h3>產品類型</h3>

    <label><input type="checkbox" value="partition" onchange="updateOptions()"> 隔間輕鋼架</label>
    <label><input type="checkbox" value="accessory" onchange="updateOptions()"> 隔間輕鋼架－配件</label>
    <label><input type="checkbox" value="tbar" onchange="updateOptions()"> T-Bar 輕鋼架</label>
    <label><input type="checkbox" value="dark" onchange="updateOptions()"> 暗架天花系列</label>
    <label><input type="checkbox" value="flow" onchange="updateOptions()"> 流明天花系列</label>
</div>

<!-- 產品選項 -->
<div class="card">
    <h3>產品選項</h3>
    <div id="optionsContainer">
        <p style="color:gray;">請先選擇產品類型</p>
    </div>
</div>

<!-- 交貨日期 -->
<div class="card">
    <h3>交貨日期</h3>
    <label>請選擇預計交貨日期 *</label>
    <input type="date" id="deliveryDate" required>
</div>

<div class="card">
    <button type="submit" class="btn">送出報價申請</button>
</div>

</form>

<script>

/* =============================
   Thickness HTML
============================= */

function thicknessHTML(){
    return `
        <div class="sub-section">
            <strong>厚度</strong>
            <label><input type="checkbox"> GA 24</label>
            <label><input type="checkbox"> GA 22</label>
            <label><input type="checkbox"> GA 20</label>
        </div>
    `;
}

function toggleThickness(checkbox){
    const container = checkbox.parentElement.nextElementSibling;
    if(checkbox.checked){
        container.innerHTML = thicknessHTML();
    } else {
        container.innerHTML = "";
    }
}

function specBlock(label){
    return `
        <label>
            <input type="checkbox" onchange="toggleThickness(this)">
            ${label}
        </label>
        <div class="sub-section thickness-area"></div>
    `;
}

/* =============================
   Level 1 (立柱類型)
============================= */

const level1HTML = `
<div class="sub-section">

<h4>請選擇立柱類型</h4>

<label><input type="checkbox" value="c" onchange="showSpec()"> C型立柱</label>
<label><input type="checkbox" value="h" onchange="showSpec()"> H型立柱</label>
<label><input type="checkbox" value="ch" onchange="showSpec()"> C H型立柱</label>
<label><input type="checkbox" value="u" onchange="showSpec()"> U型上下槽</label>
<label><input type="checkbox" value="j" onchange="showSpec()"> J型高低槽</label>
<label><input type="checkbox" value="cf" onchange="showSpec()"> C F立柱</label>

<div id="specSection" class="sub-section"></div>

</div>
`;

/* =============================
   Level 2 Data
============================= */

const specData = {

/* ===== Partition Types ===== */

c: `
<strong>C型立柱</strong>
${specBlock("40×35 mm")}
${specBlock("50×35 mm")}
${specBlock("65×35 mm")}
${specBlock("75×35 mm")}
${specBlock("80×35 mm")}
${specBlock("92×35 mm")}
${specBlock("132×35 mm")}
${specBlock("175×35 mm")}
${specBlock("250×35 mm")}
`,

h: `
<strong>H型立柱</strong>
${specBlock("125×35 mm")}
${specBlock("132×35 mm")}
${specBlock("150×35 mm")}
${specBlock("200×35 mm")}
`,

ch: `
<strong>C H型立柱</strong>
${specBlock("65×35×7-25.4 mm")}
${specBlock("75×35×7-25.4 mm")}
${specBlock("92×35×7-25.4 mm")}
${specBlock("200×35×7-25.4 mm")}
`,

u: `
<strong>U型上下槽</strong>
${specBlock("42×30 mm - 8尺")}
${specBlock("52×30 mm - 8尺")}
${specBlock("67×30 mm - 8尺")}
${specBlock("67×40 mm - 8尺")}
${specBlock("77×30 mm - 8尺")}
${specBlock("77×40 mm - 8尺")}
${specBlock("94×30 mm - 8尺")}
${specBlock("94×40 mm - 8尺")}
${specBlock("82×30-100 mm - 8尺")}
${specBlock("134×30-100 mm - 8尺")}
${specBlock("177×30-100 mm - 8尺")}
${specBlock("252×30-100 mm - 8尺")}
`,

j: `
<strong>J型高低槽</strong>
${specBlock("67×57×25 mm")}
${specBlock("77×57×25 mm")}
${specBlock("94×57×25 mm")}
${specBlock("252×57×25 mm")}
`,

cf: `
<strong>C F立柱</strong>
${specBlock("65/75/92×35 mm")}
${specBlock("100×35 mm")}
${specBlock("125/35×35 mm")}
`,

/* ===== Partition Accessories ===== */

accessory: `
<strong>隔間輕鋼架－配件</strong>
<label><input type="checkbox"> 11筋擴張網 2尺 × 8尺</label>
<label><input type="checkbox"> 平面型磚牆網 100×1220 mm</label>
<label><input type="checkbox"> L 收邊</label>
<label><input type="checkbox"> 7 字收邊</label>
<label><input type="checkbox"> 護腳</label>
`,

/* ===== Other Product Types ===== */

tbar: `
<strong>T-Bar 輕鋼架</strong>
<label><input type="checkbox"> T-Bar 平接 24×38/28 mm</label>
<label><input type="checkbox"> T-Bar 平接抗震 28 型 24×38/28 mm</label>
<label><input type="checkbox"> T-Bar 平接抗震 38 型 24×38/28 mm</label>
<label><input type="checkbox"> T-Bar 平接抗震 48 型 24×48/28 mm</label>
`,

dark: `
<strong>暗架天花系列</strong>
<label><input type="checkbox"> 大百葉 8/12尺 26GA</label>
<label><input type="checkbox"> 大百葉 8/10/12尺 25GA</label>
<label><input type="checkbox"> 大百葉 8/10/12尺 24GA</label>
<label><input type="checkbox"> 百葉支撐架 8/10尺 22GA 36×19×36mm</label>
<label><input type="checkbox"> 百葉支撐架 8/10尺 22GA 32×22×32mm</label>
`,

flow: `
<strong>流明天花系列</strong>
<label><input type="checkbox"> 方格網 5×5 (黑/白)</label>
<label><input type="checkbox"> 方格網 3×3 (黑/白)</label>
<label><input type="checkbox"> 菱形網 603×603 (黑/白)</label>
<label><input type="checkbox"> 菱形網 603×603 (紅)</label>
<label><input type="checkbox"> 魚形網 603×603 (黑/白)</label>
<label><input type="checkbox"> 蜂巢網 603×603 (黑/白)</label>
`
};

/* =============================
   Update Level 0
============================= */

function updateOptions(){

    const container = document.getElementById("optionsContainer");
    const selected = document.querySelectorAll('input[type="checkbox"][value]:checked');

    let html = "";

    selected.forEach(box => {

        if(box.value === "partition"){
            html += level1HTML;
        }

        if(specData[box.value]){
            html += `<div class="sub-section">${specData[box.value]}</div>`;
        }

    });

    container.innerHTML = html || '<p style="color:gray;">請先選擇產品類型</p>';
}

/* =============================
   Show Level 2
============================= */

function showSpec(){

    const checkboxes = document.querySelectorAll('#optionsContainer input[type="checkbox"]:checked');
    const specContainer = document.getElementById("specSection");

    let html = "";

    checkboxes.forEach(box=>{
        if(specData[box.value]){
            html += specData[box.value];
        }
    });

    specContainer.innerHTML = html;
}

/* =============================
   Prevent Submit
============================= */

document.getElementById("quotationForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("報價申請已送出（示範版本）");
});

</script>

</body>
</html>
