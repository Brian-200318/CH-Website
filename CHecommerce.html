<!DOCTYPE html>
<html lang="zh">
<head>

<title>承閎股份有限公司 — E-Commerce</title>

<style>
/* ============================================================
   GLOBAL — MATCH INDEX / P1 THEME
============================================================ */
html { scroll-padding-top: 140px; }
body {
    margin:0;
    font-family:'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background:#f7faff;
    color:#222;
    line-height:1.75;
    overflow-x:hidden;
    transition:0.3s ease;
}

/* Fade-up animation */
.fade-up {
    opacity:0;
    animation: fadeUp 0.9s ease forwards;
}
@keyframes fadeUp {
    from { opacity:0; transform:translateY(35px); }
    to { opacity:1; transform:translateY(0); }
}

/* Floating circles */
.circle {
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle, #ffffffaa, #2760A833);
    filter:blur(4px);
}
.c1 { width:180px;height:180px; top:80px; left:12%; animation:floatAnim 6s infinite; }
.c2 { width:240px;height:240px; bottom:60px; right:12%; animation:floatAnim 8s infinite; }
.c3 { width:140px;height:140px; bottom:22%; left:20%; animation:floatAnim 7s infinite; }

@keyframes floatAnim {
    0% { transform:translateY(0px); }
    50% { transform:translateY(-12px); }
    100% { transform:translateY(0px); }
}

/* ============================================================
   HEADER — GLASS STYLE
============================================================ */
header {
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
    padding:10px 40px;
    height:92px;
    display:flex;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.3);
    box-shadow:0 6px 25px rgba(0,0,0,0.15);
}
header img {
    height:72px; width:72px;
    border-radius:16px;
    object-fit:cover;
    margin-right:20px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(39,96,168,0.35);
    background:white;
    display:block;
}
header h1 {
    margin:0;
    font-size:30px;
    font-weight:750;
    color:#1F4F89;
}

.header-logo-link{
    display:flex;
    align-items:center;
    text-decoration:none;
}

/* LANGUAGE BUTTON */
.lang-btn {
    padding:10px 20px;
    background:linear-gradient(135deg,#2760A8,#1F4F89);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(39,96,168,0.35);
    transition:.2s;
}
.lang-btn:hover { transform:translateY(-3px); }

/* POPDOWN NAV */
#navBar {
    background:linear-gradient(to right, #2760A8, #1F4F89);

    position:fixed;
    top:110px; left:0;
    display:flex;

#navBar.visible { opacity:1; height:60px; padding:14px 0; }
.nav-item {
    color:white; cursor:pointer;
    font-size:19px; font-weight:650;
    transition:0.2s;
    user-select:none;
    white-space:nowrap;
}
.nav-item:hover { transform:scale(1.18); }

/* BACK BUTTON */
.side-back {
    position:fixed;
    top:120px;
    left:0;
    width:36px;
    height:70px;
    background:linear-gradient(135deg,#2760A8,#1F4F89);
    color:white;
    font-size:24px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:0 14px 14px 0;
    cursor:pointer;
    z-index:2000;

}
.side-back:hover { transform:translateX(5px); }

/* HERO */
#hero {

    background:linear-gradient(135deg,#eaf1ff,#f7faff 40%,#e2ecff);
    position:relative;

#hero h1 {

}

/* CONTENT */

section { margin-bottom:40px; }
h2 { margin-top:0; color:#1F4F89; font-size:28px; }

/* IMAGES */

label{

input[type="text"],

input[type="checkbox"]{

.btn{

.sub-section{

<!-- ===== YOUR ORIGINAL FILE START (UNCHANGED) ===== -->

<h2>承閎電子商務 — 產品報價申請</h2>

<form id="quotationForm">

<!-- 基本資料 -->
<div class="card">
    <h3>基本資料</h3>
    <label>公司名稱及聯絡人 *</label>

</div>

    <h3>產品類型</h3>

    <label><input type="checkbox" name="productType" value="partition" onchange="updateOptions()"> 隔間輕鋼架</label>
    <label><input type="checkbox" name="productType" value="accessory" onchange="updateOptions()"> 隔間輕鋼架－配件</label>

    <label><input type="checkbox" name="productType" value="flow" onchange="updateOptions()"> 流明天花系列</label>
</div>

    <h3>產品選項</h3>

        <p style="color:gray;">請先選擇產品類型</p>
    </div>
</div>

<!-- 交貨日期 -->
<div class="card">
    <h3>交貨日期</h3>
    <label>請選擇預計交貨日期 *</label>

</div>

<div class="card">
    <button type="submit" class="btn" id="submitBtn">送出報價申請</button>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTzfJBppHbwEGcq5k8ERvUUmfj66SqaQ0t-Ajnamjy9fIhWse-itmbRZ7i9HFInuXgTg/exec";

/* =============================
   Thickness HTML
============================= */

function thicknessHTML(parentLabel){
    return `
        <div class="sub-section">
            <strong>厚度</strong>
            <label><input type="checkbox" data-role="thickness" data-parent-label="${parentLabel}" value="GA 24"> GA 24</label>
            <label><input type="checkbox" data-role="thickness" data-parent-label="${parentLabel}" value="GA 22"> GA 22</label>
            <label><input type="checkbox" data-role="thickness" data-parent-label="${parentLabel}" value="GA 20"> GA 20</label>
        </div>
    `;
}

function toggleThickness(checkbox){
    const container = checkbox.parentElement.nextElementSibling;
    const parentLabel = checkbox.dataset.label || checkbox.value || checkbox.parentElement.textContent.trim();
    if(checkbox.checked){
        container.innerHTML = thicknessHTML(parentLabel);
    } else {
        container.innerHTML = "";
    }
}

function specBlock(label){
    return `
        <label>
            <input type="checkbox" data-role="spec-item" data-label="${label}" value="${label}" onchange="toggleThickness(this)">
            ${label}
        </label>
        <div class="sub-section thickness-area"></div>
    `;
}

/* =============================
   Level 1 (立柱類型)
============================= */

const level1HTML = `
<div class="sub-section">

<h4>請選擇立柱類型</h4>

<label><input type="checkbox" data-role="partition-type" value="c" onchange="showSpec()"> C型立柱</label>
<label><input type="checkbox" data-role="partition-type" value="h" onchange="showSpec()"> H型立柱</label>
<label><input type="checkbox" data-role="partition-type" value="ch" onchange="showSpec()"> C H型立柱</label>
<label><input type="checkbox" data-role="partition-type" value="u" onchange="showSpec()"> U型上下槽</label>
<label><input type="checkbox" data-role="partition-type" value="j" onchange="showSpec()"> J型高低槽</label>
<label><input type="checkbox" data-role="partition-type" value="cf" onchange="showSpec()"> C F立柱</label>

<div id="specSection" class="sub-section"></div>

</div>
`;

/* =============================
   Level 2 Data
============================= */

const specData = {

/* ===== Partition Types ===== */

c: `
<strong>C型立柱</strong>
${specBlock("40×35 mm")}
${specBlock("50×35 mm")}
${specBlock("65×35 mm")}
${specBlock("75×35 mm")}
${specBlock("80×35 mm")}
${specBlock("92×35 mm")}
${specBlock("132×35 mm")}
${specBlock("175×35 mm")}
${specBlock("250×35 mm")}
`,

h: `
<strong>H型立柱</strong>
${specBlock("125×35 mm")}
${specBlock("132×35 mm")}
${specBlock("150×35 mm")}
${specBlock("200×35 mm")}
`,

ch: `
<strong>C H型立柱</strong>
${specBlock("65×35×7-25.4 mm")}
${specBlock("75×35×7-25.4 mm")}
${specBlock("92×35×7-25.4 mm")}
${specBlock("200×35×7-25.4 mm")}
`,

u: `
<strong>U型上下槽</strong>
${specBlock("42×30 mm - 8尺")}
${specBlock("52×30 mm - 8尺")}
${specBlock("67×30 mm - 8尺")}
${specBlock("67×40 mm - 8尺")}
${specBlock("77×30 mm - 8尺")}
${specBlock("77×40 mm - 8尺")}
${specBlock("94×30 mm - 8尺")}
${specBlock("94×40 mm - 8尺")}
${specBlock("82×30-100 mm - 8尺")}
${specBlock("134×30-100 mm - 8尺")}
${specBlock("177×30-100 mm - 8尺")}
${specBlock("252×30-100 mm - 8尺")}
`,

j: `
<strong>J型高低槽</strong>
${specBlock("67×57×25 mm")}
${specBlock("77×57×25 mm")}
${specBlock("94×57×25 mm")}
${specBlock("252×57×25 mm")}
`,

cf: `
<strong>C F立柱</strong>
${specBlock("65/75/92×35 mm")}
${specBlock("100×35 mm")}
${specBlock("125/35×35 mm")}
`,

/* ===== Partition Accessories ===== */

accessory: `
<strong>隔間輕鋼架－配件</strong>
<label><input type="checkbox" data-role="option-item" value="11筋擴張網 2尺 × 8尺"> 11筋擴張網 2尺 × 8尺</label>
<label><input type="checkbox" data-role="option-item" value="平面型磚牆網 100×1220 mm"> 平面型磚牆網 100×1220 mm</label>
<label><input type="checkbox" data-role="option-item" value="L 收邊"> L 收邊</label>
<label><input type="checkbox" data-role="option-item" value="7 字收邊"> 7 字收邊</label>
<label><input type="checkbox" data-role="option-item" value="護腳"> 護腳</label>
`,

/* ===== Other Product Types ===== */

tbar: `
<strong>T-Bar 輕鋼架</strong>
<label><input type="checkbox" data-role="option-item" value="T-Bar 平接 24×38/28 mm"> T-Bar 平接 24×38/28 mm</label>
<label><input type="checkbox" data-role="option-item" value="T-Bar 平接抗震 28 型 24×38/28 mm"> T-Bar 平接抗震 28 型 24×38/28 mm</label>
<label><input type="checkbox" data-role="option-item" value="T-Bar 平接抗震 38 型 24×38/28 mm"> T-Bar 平接抗震 38 型 24×38/28 mm</label>
<label><input type="checkbox" data-role="option-item" value="T-Bar 平接抗震 48 型 24×48/28 mm"> T-Bar 平接抗震 48 型 24×48/28 mm</label>
`,

dark: `
<strong>暗架天花系列</strong>
<label><input type="checkbox" data-role="option-item" value="大百葉 8/12尺 26GA"> 大百葉 8/12尺 26GA</label>
<label><input type="checkbox" data-role="option-item" value="大百葉 8/10/12尺 25GA"> 大百葉 8/10/12尺 25GA</label>
<label><input type="checkbox" data-role="option-item" value="大百葉 8/10/12尺 24GA"> 大百葉 8/10/12尺 24GA</label>
<label><input type="checkbox" data-role="option-item" value="百葉支撐架 8/10尺 22GA 36×19×36mm"> 百葉支撐架 8/10尺 22GA 36×19×36mm</label>
<label><input type="checkbox" data-role="option-item" value="百葉支撐架 8/10尺 22GA 32×22×32mm"> 百葉支撐架 8/10尺 22GA 32×22×32mm</label>
`,

flow: `
<strong>流明天花系列</strong>
<label><input type="checkbox" data-role="option-item" value="方格網 5×5 (黑/白)"> 方格網 5×5 (黑/白)</label>
<label><input type="checkbox" data-role="option-item" value="方格網 3×3 (黑/白)"> 方格網 3×3 (黑/白)</label>
<label><input type="checkbox" data-role="option-item" value="菱形網 603×603 (黑/白)"> 菱形網 603×603 (黑/白)</label>
<label><input type="checkbox" data-role="option-item" value="菱形網 603×603 (紅)"> 菱形網 603×603 (紅)</label>
<label><input type="checkbox" data-role="option-item" value="魚形網 603×603 (黑/白)"> 魚形網 603×603 (黑/白)</label>
<label><input type="checkbox" data-role="option-item" value="蜂巢網 603×603 (黑/白)"> 蜂巢網 603×603 (黑/白)</label>
`
};

/* =============================
   Update Level 0
============================= */

function updateOptions(){

    const container = document.getElementById("optionsContainer");
    const selected = document.querySelectorAll('#quotationForm input[name="productType"]:checked');

    let html = "";

    selected.forEach(box => {

        if(box.value === "partition"){
            html += level1HTML;
        } else if(specData[box.value]){
            html += `<div class="sub-section">${specData[box.value]}</div>`;
        }

    });

    container.innerHTML = html || '<p style="color:gray;">請先選擇產品類型</p>';
}

/* =============================
   Show Level 2
============================= */

function showSpec(){

    const specContainer = document.getElementById("specSection");
    if(!specContainer) return;

    const selected = document.querySelectorAll(
        '#optionsContainer input[value="c"]:checked, ' +
        '#optionsContainer input[value="h"]:checked, ' +
        '#optionsContainer input[value="ch"]:checked, ' +
        '#optionsContainer input[value="u"]:checked, ' +
        '#optionsContainer input[value="j"]:checked, ' +
        '#optionsContainer input[value="cf"]:checked'
    );

    let html = "";

    selected.forEach(box=>{
        if(specData[box.value]){
            html += `<div class="sub-section">${specData[box.value]}</div>`;
        }
    });

    specContainer.innerHTML = html;
}

function getCheckedValues(selector){
    return Array.from(document.querySelectorAll(selector))
        .filter(el => el.checked)
        .map(el => el.value);
}

function getDetailedSelections(){
    const selections = [];

    document.querySelectorAll('#optionsContainer input[data-role="spec-item"]:checked').forEach(spec => {
        const parentBlock = spec.closest('label').nextElementSibling;
        const thicknesses = parentBlock
            ? Array.from(parentBlock.querySelectorAll('input[data-role="thickness"]:checked')).map(item => item.value)
            : [];

        selections.push({
            item: spec.value,
            thickness: thicknesses
        });
    });

    document.querySelectorAll('#optionsContainer input[data-role="option-item"]:checked').forEach(item => {
        selections.push({
            item: item.value,
            thickness: []
        });
    });

    return selections;
}

function setFormMessage(message, type){
    const formMessage = document.getElementById("formMessage");
    formMessage.className = `form-message ${type}`;
    formMessage.textContent = message;
}

function formatSelectionsForSheet(selections){
    if(!selections.length) return "";
    return selections.map(selection => {
        if(selection.thickness && selection.thickness.length){
            return `${selection.item}｜厚度: ${selection.thickness.join(", ")}`;
        }
        return selection.item;
    }).join(" / ");
}

/* =============================
   Submit to Google Apps Script
============================= */

document.getElementById("quotationForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    setFormMessage("送出中，請稍候…", "success");

    const productTypes = getCheckedValues('#quotationForm input[name="productType"]:checked');
    const partitionTypes = getCheckedValues('#optionsContainer input[data-role="partition-type"]:checked');
    const detailedSelections = getDetailedSelections();

    const payload = {
        companyContact: document.getElementById("companyContact").value.trim(),
        contactInfo: document.getElementById("contactInfo").value.trim(),
        productTypes: productTypes,
        partitionTypes: partitionTypes,
        detailedSelections: detailedSelections,
        deliveryDate: document.getElementById("deliveryDate").value,
        detailedSelectionsText: formatSelectionsForSheet(detailedSelections),
        pageSource: "CHecommerce.html",
        submittedAt: new Date().toISOString()
    };

    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload)
        });

        const resultText = await response.text();

        if(!response.ok){
            throw new Error(resultText || "提交失敗");
        }

        setFormMessage("報價申請已送出，我們會盡快與您聯繫。", "success");
        this.reset();
        updateOptions();
    } catch (error) {
        console.error(error);
        setFormMessage("送出失敗，請稍後再試，或直接與我們聯絡。", "error");
    } finally {
        submitBtn.disabled = false;
    }
});

</script>

<script>
function showNav(){
